<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; border-radius: 15px; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .table { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <title>Gestione Ordini</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <th>Azioni</th>
</head>
<body class="container mt-5">
<h1 class="mb-4">📦 Magazzino Prodotti</h1>
<div class="card mb-4">
    <div class="card-body">
        <h5 class="card-title">Aggiungi Nuovo Prodotto</h5>
        <form action="/nuovo-prodotto-web" method="POST" class="row g-3">
            <div class="col-md-4">
                <input type="text" name="nome" class="form-control" placeholder="Nome prodotto" required>
            </div>
            <div class="col-md-3">
                <input type="number" step="0.01" name="prezzo" class="form-control" placeholder="Prezzo" required>
            </div>
            <div class="col-md-3">
                <input type="number" name="quantita" class="form-control" placeholder="Quantità" required>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-success w-100">Aggiungi</button>
            </div>
        </form>
    </div>
</div>
<table class="table table-striped table-bordered">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Prezzo</th>
        <th>Quantità Magazzino</th>
        <th>Azioni</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p : ${prodotti}">
        <td th:text="${p.id}"></td>
        <td th:text="${p.nome}"></td>
        <td th:text="${p.prezzo} + ' €'"></td>
        <td th:text="${p.quantita}"
            th:classappend="${p.quantita < 5} ? 'text-danger fw-bold' : ''">
        </td>
        <td>
            <div class="d-flex align-items-center">
                <form action="/compra-web" method="POST" class="d-flex me-3">
                    <input type="hidden" name="prodottoId" th:value="${p.id}">
                    <input type="number" name="quantita" value="1" min="1"
                           class="form-control form-control-sm me-1" style="width: 70px;">
                    <button type="submit" class="btn btn-primary btn-sm d-flex align-items-center">
                        <span class="material-icons me-1">shopping_cart</span> Compra
                    </button>
                </form>

                <a th:href="@{/elimina-prodotto-web/{id}(id=${p.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Sei sicuro?')">
                    Elimina
                </a>
            </div>
        </td>
    </tr>
    </tbody>
</table>
<a href="/visualizza-ordini" class="btn btn-info mb-3">Vai allo Storico Ordini</a>
</body>
</html>
