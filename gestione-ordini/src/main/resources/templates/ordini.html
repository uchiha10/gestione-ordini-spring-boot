<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; border-radius: 15px; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .table { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <title>Lista Ordini</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>📑 Storico Ordini</h1>
    <a href="/dashboard" class="btn btn-secondary">Torna al Magazzino</a>
</div>

<table class="table table-hover border">
    <thead class="table-dark">
    <tr>
        <th>ID Ordine</th>
        <th>Prodotto</th>
        <th>Quantità</th>
        <th>Totale Pagato</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="o : ${ordini}">
        <td th:text="${o.id}"></td>

        <td>
            <span th:if="${o.prodotto != null}" th:text="${o.prodotto.nome}"></span>
            <span th:if="${o.prodotto == null}" class="text-danger italic">Prodotto non collegato</span>
        </td>
        <td>
            <a th:href="@{/annulla-ordine-web/{id}(id=${o.id})}"
               class="btn btn-outline-warning btn-sm">
                Annulla
            </a>
        </td>
        <td>
            <a th:href="@{/ordine/pdf/{id}(id=${o.id})}" class="btn btn-outline-danger btn-sm">
                <i class="bi bi-file-earmark-pdf"></i> Scarica PDF
            </a>
        </td>

        <td th:text="${o.quantita}"></td>

        <td th:text="${o.SpesaTotale != null ? o.SpesaTotale + '€' : '0.00€'}" class="fw-bold text-success"></td>
    </tr>
    </tbody>
</table>
<div class="alert alert-info mt-4">
    <h4>Guadagno Totale:
        <span th:text="${#numbers.formatDecimal(totaleIncassato, 1, 2)} + ' €'">0.00 €</span>
    </h4>
</div>
</body>
</html>
